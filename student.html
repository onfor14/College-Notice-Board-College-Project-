<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notice Board — Student</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-page">

  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-icon">📋</span>
      <span class="topbar-title">Notice Board</span>
    </div>
    <div class="topbar-right">
      <span class="welcome-text">👤 <span id="userName"></span></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="main-content">
    <div class="page-heading">
      <h2>All Notices</h2>
      <p class="sub">Stay up to date with the latest announcements</p>
    </div>

    <div id="noticeList" class="notice-grid">
      <p class="loading-text">Loading notices...</p>
    </div>
  </main>

  <script src="notices.js"></script>
  <script>
    // Show username from localStorage
    document.getElementById('userName').textContent = localStorage.getItem('userName') || 'Student';

    // Load notices on page load
    loadNotices();

    async function logout() {
      await fetch('http://localhost:5000/logout', { method: 'POST', credentials: 'include' });
      localStorage.clear();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
