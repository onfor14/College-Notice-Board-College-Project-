<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notice Board — Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-page">

  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-icon">📋</span>
      <span class="topbar-title">Notice Board</span>
      <span class="admin-badge">Admin</span>
    </div>
    <div class="topbar-right">
      <span class="welcome-text">👤 <span id="userName"></span></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="main-content">
    <div class="page-heading">
      <div>
        <h2>All Notices</h2>
        <p class="sub">Manage and publish college notices</p>
      </div>
      <!-- "+ Add Notice" button — only visible on admin page -->
      <button class="btn-primary" onclick="toggleForm()">+ Add Notice</button>
    </div>

    <!-- Add Notice Form (hidden by default) -->
    <div id="addForm" class="add-form hidden">
      <h3>New Notice</h3>
      <div class="form-grid">
        <div class="field">
          <label>Title</label>
          <input type="text" id="title" placeholder="Notice title" required />
        </div>
        <div class="field">
          <label>Category</label>
          <input type="text" id="category" placeholder="e.g. Exam, Event, Library" required />
        </div>
        <div class="field">
          <label>Date Added</label>
          <input type="date" id="date_added" required />
        </div>
        <div class="field">
          <label>Last Date</label>
          <input type="date" id="last_date" required />
        </div>
        <div class="field full-width">
          <label>Description</label>
          <textarea id="description" rows="3" placeholder="Write notice details here..."></textarea>
        </div>
      </div>
      <p id="formMsg" class="error-msg"></p>
      <div class="form-actions">
        <button class="btn-primary" onclick="submitNotice()">Save Notice</button>
        <button class="btn-secondary" onclick="toggleForm()">Cancel</button>
      </div>
    </div>

    <div id="noticeList" class="notice-grid">
      <p class="loading-text">Loading notices...</p>
    </div>
  </main>

  <script src="notices.js"></script>
  <script>
    document.getElementById('userName').textContent = localStorage.getItem('userName') || 'Admin';
    loadNotices();

    // Show / hide the add notice form
    function toggleForm() {
      const form = document.getElementById('addForm');
      form.classList.toggle('hidden');
    }

    // Submit new notice to backend
    async function submitNotice() {
      const notice = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        category: document.getElementById('category').value,
        date_added: document.getElementById('date_added').value,
        last_date: document.getElementById('last_date').value
      };

      if (!notice.title || !notice.description || !notice.category || !notice.date_added || !notice.last_date) {
        document.getElementById('formMsg').textContent = 'Please fill all fields.';
        return;
      }

      const res = await fetch('http://localhost:5000/add-notice', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(notice)
      });

      const data = await res.json();
      if (data.success) {
        toggleForm();   // hide form
        loadNotices();  // refresh list
      } else {
        document.getElementById('formMsg').textContent = data.message || 'Error saving notice.';
      }
    }

    async function logout() {
      await fetch('http://localhost:5000/logout', { method: 'POST', credentials: 'include' });
      localStorage.clear();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
